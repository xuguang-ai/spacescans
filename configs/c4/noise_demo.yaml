name: noise_270m_demo
linkage_pattern: static_areal        # C4: static gridded — grid-level weights, no temporal dim
geometry_type: raster                # C3 only: input data geometry

source:                              # C4: C3-produced Noise weight table (demo)
  file: output/python_v2/270m/Noise/C3/buffer270m_noise_weights_demo100k.parquet
  join_col: grid_id

buffer:
  patient_file: data_full/demo_patients_conus_fast_100000.parquet  # 100k CONUS demo
  patient_adapter: demo_conus
  buffer_m: 270

exposure:                            # C4: 3 noise TIFs (sibling-resolved from primary file's dir)
  file: data/Noise/C3/CONUS_L50dBA_sumDay_exi.tif
  join_col: grid_id
  value_cols:
    - l50dba_exi
    - l50dba_imp
    - l50dba_nat

time:
  temporal_resolution: static
  temporal_mode: static

engine:
  backend: duckdb

plugin: noise

output:
  path: output/python_v2/270m/Noise/C4/noise_270m_demo100k.parquet
  format: parquet
  label_path: output/python_v2/270m/Noise/C4/label_noise_270m_demo100k.parquet
