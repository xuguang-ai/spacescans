name: temis_270m_demo
linkage_pattern: gridded             # C4: per-day raster + C3 weight table → patient × year × value
geometry_type: raster                # C3 only: input data geometry

source:                              # C4: C3-produced weight table (demo)
  file: output/python_v2/270m/TEMIS/C3/buffer270m_temis_weights_demo100k.parquet

buffer:
  patient_file: data_full/demo_patients_conus_fast_100000.parquet
  patient_adapter: demo_conus
  buffer_m: 270

exposure:                            # C4: 4 UV vars × 7 yrs × 365 days = 10,220 HDF files
  file: data_full/TEMIS/C4/raw
  join_col: grid_id
  value_cols:
    - uvddc
    - uvdec
    - uvdvc
    - uvief
  date_col: date

time:
  years: [2013, 2014, 2015, 2016, 2017, 2018, 2019]
  temporal_resolution: daily
  temporal_mode: yearly

engine:
  backend: duckdb

plugin: temis

output:
  path: output/python_v2/270m/TEMIS/C4/temis_270m_demo100k.parquet
  format: parquet
  label_path: output/python_v2/270m/TEMIS/C4/label_temis_270m_demo100k.parquet
