name: nhd_bluespace_demo
linkage_pattern: precomputed_static  # C4: episode-duration-weighted TWA over geoid-level distances
geometry_type: line

source:                              # Required by schema; not used spatially
  file: data_full/NHD/C4/NHDPlus_H_National_Release_2_GDB.gdb

buffer:
  patient_file: data_full/demo_patients_conus_fast_100000.parquet
  patient_adapter: demo_conus

exposure:                            # C4: read C3 output via nhd plugin
  file: output/python_v2/270m/NHD/C3/proximity_blue_demo100k.parquet
  join_col: geoid
  value_cols:
    - dist_flow_m
    - dist_water_m
    - dist_area_m
    - dist_coast_m
    - dist_blue_m
  fill_na:                           # v1: fill NaN coast with 99999 after patient TWA
    dist_coast_m: 99999.0

time:
  temporal_resolution: static
  temporal_mode: static

engine:
  backend: duckdb

plugin: nhd

output:
  path: output/python_v2/270m/NHD/C4/nhd_demo100k.parquet
  format: parquet
  label_path: output/python_v2/270m/NHD/C4/label_nhd_demo100k.parquet
