name: vnl_demo
linkage_pattern: gridded             # C4: per-year raster + C3 weight table → patient × year × value
geometry_type: raster                # C3 only: input data geometry

source:                              # C4: C3-produced weight table (demo)
  file: output/python_v2/270m/VNL/C3/buffer270m_vnl_weights_demo100k.parquet

buffer:
  patient_file: data_full/demo_patients_conus_fast_100000.parquet
  patient_adapter: demo_conus
  buffer_m: 270

exposure:                            # C4: 9 annual VNL .tif (filtered to 2013-2019 by reader)
  file: data_full/VNL/C3
  join_col: grid_id
  value_cols: [value]
  start_col: start_date
  end_col: end_date

time:
  years: [2013, 2014, 2015, 2016, 2017, 2018, 2019]
  temporal_resolution: yearly
  temporal_mode: yearly

engine:
  backend: duckdb

plugin: vnl                          # reader: parses VNL filenames + extracts cells at C3 grid_ids

output:
  path: output/python_v2/270m/VNL/C4/vnl_demo100k.parquet
  format: parquet
