name: nhd_demo
linkage_pattern: nhd_proximity       # C3-equivalent: per-geoid distance to NHD blue features
geometry_type: line                  # NHD has both line + polygon features

source:                              # C3: NHDPlus_H National GDB (61 GB)
  file: data_full/NHD/C4/NHDPlus_H_National_Release_2_GDB.gdb
  road_cache_dir: cache/C3/nhd_features  # reuse field for per-tile feature cache (cohort-independent)

buffer:
  patient_file: data_full/demo_patients_conus_fast_100000.parquet
  patient_adapter: demo_conus

engine:
  backend: duckdb

output:                              # C3 output: (geoid, dist_flow/water/area/coast/blue _m)
  path: output/python_v2/270m/NHD/C3/proximity_blue_demo100k.parquet
  format: parquet
