name: tiger_roads_demo
linkage_pattern: tiger_proximity     # C3-equivalent: per-(geoid, year) road distances
geometry_type: line                  # C3 only: input data geometry

source:                              # C3: TIGER zip directory + county boundary
  file: data_full/TIGER/C4           # contains tiger{year}_roads/tl_{year}_{cnty}_roads.zip
  county_file: data_full/County_FL/C3/tl_2010_us_county10/tl_2010_us_county10.shp
  road_cache_dir: cache/C3/tiger_roads_filtered  # cohort-independent: caches S1100/S1200 per (county, year)

buffer:
  patient_file: data_full/demo_patients_conus_fast_100000.parquet  # 100k CONUS demo
  patient_adapter: demo_conus

time:
  years: [2013, 2014, 2015, 2016, 2017, 2018, 2019]
  temporal_resolution: yearly
  temporal_mode: yearly

engine:
  backend: duckdb

output:                              # C3 output: (geoid, year, dist_pri, dist_sec, dist_prisec)
  path: output/python_v2/270m/TIGER/C3/annual_proximity_demo100k.parquet
  format: parquet
