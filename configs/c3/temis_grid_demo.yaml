name: temis_grid_demo
linkage_pattern: grid_weights        # C3: extract raster-buffer coverage weights
geometry_type: raster                # C3 only: input data geometry

source:                              # C3: TEMIS template raster (defines global pixel grid)
  file: output/python/270m/TEMIS/C3/temis_template.tif

buffer:
  patient_file: data_full/demo_patients_conus_fast_100000.parquet  # 100k CONUS demo
  patient_adapter: demo_conus
  buffer_m: 270

transforms:                          # Fix CRS/extent on template raster
  - type: spatial_fix
    target: source
    fix_type: assign_crs
    crs: "EPSG:4326"
  - type: spatial_fix
    target: source
    fix_type: set_extent
    extent: [-180.0, 180.0, -90.0, 90.0]

engine:
  backend: duckdb

plugin: temis

output:                              # C3 weight table [geoid, grid_id, weight]
  path: output/python_v2/270m/TEMIS/C3/buffer270m_temis_weights_demo100k.parquet
  format: parquet
