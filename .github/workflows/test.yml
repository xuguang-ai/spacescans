name: test (base)
on:
  push: {branches: [main]}
  pull_request: {branches: [main]}

jobs:
  test-base:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "${{ matrix.python }}"}
      - run: pip install -e .[dev]
      - run: pytest tests/ -v -m "not extras and not geo and not rda and not hdf4 and not nc and not slow" --tb=short
